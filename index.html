<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 학습 통합 앱</title>
    <script src="words.js"></script>
    <style>
        :root {
            --primary: #3498db; --success: #2ecc71; --danger: #e74c3c;
            --study: #8e44ad; --bg: #f0f4f8; --white: #ffffff; --text: #2c3e50;
            --list: #f39c12; /* 문장 리스트 메뉴 색상 추가 */
        }

        body { font-family: 'Meiryo', sans-serif; background: var(--bg); text-align: center; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .box { background: var(--white); width: 500px; height: 750px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; color: var(--text); display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        
        /* 문장 리스트 화면 추가 */
        #mainMenu, #studyMode, #typingStart, #typingGame, #quizGame, #resultScreen, #sentenceListMode { width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #mainMenu { display: flex; }

        .title { font-size: 28px; font-weight: bold; margin-bottom: 30px; color: var(--text); }
        .menu-container { display: flex; flex-direction: column; gap: 12px; width: 100%; } /* 간격 살짝 조정 */
        .btn-menu { width: 100%; height: 85px; font-size: 22px; cursor: pointer; border: none; border-radius: 18px; color: white; font-weight: bold; transition: 0.3s; }
        .btn-study { background: var(--study); box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3); }
        .btn-typing { background: var(--primary); box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3); }
        .btn-quiz { background: var(--success); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3); }
        .btn-list { background: var(--list); box-shadow: 0 6px 20px rgba(243, 156, 18, 0.3); } /* 리스트 버튼 스타일 */
        .btn-menu:hover { transform: translateY(-5px); filter: brightness(1.05); }

        /* 문장 리스트 전용 스타일 */
        .list-container { width: 100%; flex: 1; overflow-y: auto; background: #f8f9fa; border-radius: 20px; padding: 10px; box-sizing: border-box; text-align: left; margin-bottom: 15px; }
        .list-item { padding: 12px; border-bottom: 1px solid #eee; }
        .list-jp { color: var(--study); font-weight: bold; font-size: 18px; margin-bottom: 4px; }
        .list-kr { color: var(--text); font-size: 15px; }
        .list-ro { color: #95a5a6; font-size: 13px; }

        /* 쇼츠 스타일 */
        .shorts-container { width: 100%; height: 500px; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; border-radius: 20px; background: #f8f9fa; }
        .shorts-container::-webkit-scrollbar { display: none; }
        .shorts-card { width: 100%; height: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #eee; position: relative; cursor: pointer; user-select: none; }
        .shorts-jp { width: 100%; max-width: 420px; font-weight: bold; color: var(--study); margin-bottom: 15px; padding: 0 20px; box-sizing: border-box; word-break: keep-all; overflow-wrap: break-word; line-height: 1.4; text-align: center; }
        .shorts-kr { width: 100%; max-width: 420px; font-weight: bold; color: var(--success); display: none; padding: 0 20px; box-sizing: border-box; word-break: keep-all; overflow-wrap: break-word; line-height: 1.4; text-align: center; }
        .shorts-ro { width: 100%; max-width: 420px; font-size: 16px; color: #95a5a6; margin-bottom: 20px; padding: 0 20px; box-sizing: border-box; word-break: break-all; }
        
        input, select { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 12px; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        .q-jp { font-weight: bold; margin-bottom: 10px; width: 100%; max-width: 420px; box-sizing: border-box; word-break: keep-all; overflow-wrap: break-word; line-height: 1.3; }
        .timer-container { width: 100%; height: 12px; background: #eee; margin-top: 25px; border-radius: 10px; overflow: hidden; }
        .bar { width: 100%; height: 100%; background: var(--success); transition: width 0.1s linear; }
        .btn-action { width: 100%; padding: 18px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; margin-top: 15px; }
        .btn-home-style { background: #95a5a6; color: white; }
        .btn-stop-style { background: var(--danger); color: white; }
        .feedback-text { visibility: hidden; font-size: 26px; font-weight: bold; margin-top: 15px; height: 35px; }
        .option-btn { width: 100%; padding: 15px; font-size: 20px; background: white; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .option-btn:hover { background: #f8f9fa; border-color: var(--primary); }
    </style>
</head>
<body>

<div class="box">
    <div id="mainMenu">
        <div class="title">일본어 학습 통합 앱</div>
        <div class="menu-container">
            <button class="btn-menu btn-study" onclick="startStudy()">일본어 공부</button>
            <button class="btn-menu btn-typing" onclick="showScreen('typingStart')">타이핑 연습</button>
            <button class="btn-menu btn-quiz" onclick="startQuizMode()">단어 퀴즈</button>
            <button class="btn-menu btn-list" onclick="showSentenceList()">문장 리스트</button>
        </div>
    </div>

    <div id="sentenceListMode">
        <div class="title" style="margin-bottom:15px;">전체 문장 리스트</div>
        <div class="list-container" id="listContainer"></div>
        <button class="btn-action btn-home-style" onclick="showScreen('mainMenu')">홈으로</button>
    </div>

    <div id="studyMode">
        <div class="title" style="margin-bottom:10px;">플래시 카드</div>
        <div class="shorts-container" id="shortsContainer"></div>
        <div class="swipe-hint" style="font-size:13px; color:#bdc3c7; margin-top:10px;">클릭: 정답 확인 | 스와이프: 이동</div>
        <button class="btn-action btn-home-style" onclick="showScreen('mainMenu')">홈으로</button>
    </div>

    <div id="typingStart">
        <div class="title">타이핑 설정</div>
        <p>제한 시간 선택 (초)</p>
        <select id="timeSelect">
            <option value="5">5초 (매우 빠름)</option>
            <option value="10" selected>10초 (보통)</option>
            <option value="20">20초 (느긋하게)</option>
        </select>
        <button class="btn-action btn-typing" style="color:white; font-size:22px;" onclick="initGame('typing')">시작하기</button>
        <button class="btn-action btn-home-style" onclick="showScreen('mainMenu')">홈으로</button>
    </div>

    <div id="typingGame">
        <div id="roundText" style="font-size:16px; color:#95a5a6; margin-bottom:15px;">ROUND 1 / 10</div>
        <div class="q-jp" id="target">-</div>
        <div id="targetKr" style="color:#95a5a6; margin-bottom:20px; font-size:20px;">뜻</div>
        <input type="text" id="answer" oninput="checkTyping()" autocomplete="off" placeholder="일본어를 입력하세요">
        <div class="timer-container"><div id="typingBar" class="bar"></div></div>
        <div id="typingFeedback" class="feedback-text">정답!</div>
        <button class="btn-action btn-stop-style" onclick="showScreen('mainMenu')">중단하기</button>
    </div>

    <div id="quizGame">
        <div id="quizRoundText" style="font-size:16px; color:#95a5a6; margin-bottom:15px;">ROUND 1 / 10</div>
        <div class="q-jp" id="quizTarget">-</div>
        <div id="quizOptions" style="width:100%; margin-top:10px;"></div>
        <div class="timer-container"><div id="quizBar" class="bar"></div></div>
        <div id="quizFeedback" class="feedback-text">정답!</div>
        <button class="btn-action btn-stop-style" onclick="showScreen('mainMenu')">중단하기</button>
    </div>

    <div id="resultScreen">
        <div class="title">학습 결과</div>
        <div id="finalScoreNum" style="font-size:40px; font-weight:bold; color:var(--primary);">0</div>
        <div id="answerList" style="flex:1; overflow-y:auto; width:100%; margin:20px 0; text-align:left; font-size:14px;"></div>
        <button class="btn-action btn-typing" id="retryBtn" onclick="" style="color:white;">다시하기</button>
        <button class="btn-action btn-home-style" onclick="showScreen('mainMenu')">홈으로</button>
    </div>
</div>

<script>
    let words = typeof wordData !== 'undefined' ? wordData : [];
    let score = 0, currentRound = 0, totalRounds = 10, timeLeft = 100;
    let timerInterval, currentWord, gameMode = "", sessionHistory = [];

    function showScreen(id) {
        clearInterval(timerInterval);
        const screens = ["mainMenu", "studyMode", "typingStart", "typingGame", "quizGame", "resultScreen", "sentenceListMode"];
        screens.forEach(s => {
            const el = document.getElementById(s);
            if(el) el.style.display = (s === id) ? "flex" : "none";
        });

        if (id === 'mainMenu') {
            const container = document.getElementById('shortsContainer');
            if (container) container.scrollTop = 0; 
        }
    }

    // 신규 추가: 문장 리스트 보여주기
    function showSentenceList() {
        if(words.length === 0) return alert("데이터가 없습니다.");
        showScreen('sentenceListMode');
        const container = document.getElementById('listContainer');
        container.innerHTML = words.map((item, index) => `
            <div class="list-item">
                <div style="font-size:12px; color:#bdc3c7;">#${index + 1}</div>
                <div class="list-jp">${item.jp}</div>
                <div class="list-ro">${item.ro}</div>
                <div class="list-kr">${item.kr}</div>
            </div>
        `).join('');
        container.scrollTop = 0;
    }

    function startStudy() {
        if(words.length === 0) return alert("데이터가 없습니다.");
        showScreen('studyMode');
        const container = document.getElementById('shortsContainer');
        container.innerHTML = "";
        container.scrollTop = 0; 

        words.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'shorts-card';
            card.dataset.view = "jp";

            let len = item.jp.length;
            let jpSize, krSize;
            if (len > 40) { jpSize = "20px"; krSize = "18px"; } 
            else if (len > 30) { jpSize = "24px"; krSize = "22px"; } 
            else if (len > 20) { jpSize = "28px"; krSize = "24px"; } 
            else if (len > 10) { jpSize = "34px"; krSize = "28px"; } 
            else { jpSize = "45px"; krSize = "36px"; }

            card.innerHTML = `
                <div class="shorts-index">${index + 1} / ${words.length}</div>
                <div class="shorts-jp" style="font-size: ${jpSize}">${item.jp}</div>
                <div class="shorts-ro">${item.ro}</div>
                <div class="shorts-kr" style="font-size: ${krSize}">${item.kr}</div>
            `;

            card.onclick = function() {
                const isJp = this.dataset.view === "jp";
                this.querySelector('.shorts-jp').style.display = isJp ? "none" : "block";
                this.querySelector('.shorts-ro').style.display = isJp ? "none" : "block";
                this.querySelector('.shorts-kr').style.display = isJp ? "block" : "none";
                this.dataset.view = isJp ? "kr" : "jp";
            };
            container.appendChild(card);
        });
    }

    function initGame(mode) {
        gameMode = mode;
        score = 0; currentRound = 0; sessionHistory = [];
        document.getElementById('retryBtn').onclick = () => initGame(mode);
        nextRound();
    }

    function startQuizMode() { initGame('quiz'); }

    function getFontSize(text) {
        let len = text.length;
        if (len > 40) return "20px";
        if (len > 30) return "24px";
        if (len > 20) return "28px";
        if (len > 10) return "34px";
        return "42px";
    }

    function nextRound() {
        if (currentRound >= totalRounds) return finishGame();
        currentRound++;
        currentWord = words[Math.floor(Math.random() * words.length)];
        timeLeft = 100;
        const autoSize = getFontSize(currentWord.jp);

        if (gameMode === 'typing') {
            showScreen('typingGame');
            document.getElementById('roundText').innerText = `ROUND ${currentRound} / ${totalRounds}`;
            const targetEl = document.getElementById('target');
            targetEl.innerText = currentWord.jp;
            targetEl.style.fontSize = autoSize;
            document.getElementById('targetKr').innerText = currentWord.kr;
            document.getElementById('answer').value = "";
            document.getElementById('answer').focus();
            startTimer('typingBar');
        } else {
            showScreen('quizGame');
            document.getElementById('quizRoundText').innerText = `ROUND ${currentRound} / ${totalRounds}`;
            const quizTargetEl = document.getElementById('quizTarget');
            quizTargetEl.innerText = currentWord.jp;
            quizTargetEl.style.fontSize = autoSize;
            makeQuizOptions();
            startTimer('quizBar');
        }
    }

    function startTimer(barId) {
        clearInterval(timerInterval);
        const bar = document.getElementById(barId);
        const limit = gameMode === 'typing' ? parseInt(document.getElementById('timeSelect').value) : 10;
        const step = 100 / (limit * 10);
        timerInterval = setInterval(() => {
            timeLeft -= step;
            bar.style.width = timeLeft + "%";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processResult(false, "시간 초과");
            }
        }, 100);
    }

    function checkTyping() {
        const input = document.getElementById('answer').value.trim();
        if (input === currentWord.jp || input === currentWord.ro) {
            processResult(true, "정답!");
        }
    }

    function makeQuizOptions() {
        const container = document.getElementById('quizOptions');
        container.innerHTML = "";
        let options = [currentWord.kr];
        while(options.length < 4) {
            let rand = words[Math.floor(Math.random() * words.length)].kr;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => processResult(opt === currentWord.kr, opt === currentWord.kr ? "정답!" : "오답");
            container.appendChild(btn);
        });
    }

    function processResult(isCorrect, msg) {
        clearInterval(timerInterval);
        if(isCorrect) score++;
        sessionHistory.push({word: currentWord.jp, kr: currentWord.kr, correct: isCorrect});
        const feedback = document.getElementById(gameMode + 'Feedback');
        feedback.innerText = msg;
        feedback.style.visibility = "visible";
        feedback.style.color = isCorrect ? "var(--success)" : "var(--danger)";
        setTimeout(() => {
            feedback.style.visibility = "hidden";
            nextRound();
        }, 1000);
    }

    function finishGame() {
        showScreen('resultScreen');
        document.getElementById('finalScoreNum').innerText = `${score} / ${totalRounds}`;
        const list = document.getElementById('answerList');
        list.innerHTML = sessionHistory.map(h => 
            `<div style="padding:5px; border-bottom:1px solid #eee; color:${h.correct ? 'black' : 'red'}">
                ${h.correct ? '✓' : '✗'} <b>${h.word}</b>: ${h.kr}
            </div>`).join('');
    }
</script>
</body>
</html>
