<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese Impact - Smart Persistence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* 1. 상단 네비게이션 */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px);
            z-index: 10000; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
        }
        .nav-title { font-weight: 700; font-size: 11px; color: #666; letter-spacing: 1px; }
        .nav-menu { display: flex; gap: 12px; }
        .menu-btn { 
            background: #222; color: #fff; border: none; padding: 8px 24px; min-width: 100px; height: 45px;
            border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .menu-btn.active { background: #6200ee; font-weight: bold; }

        /* 2. 3단 언어 제어 탭 */
        .display-tab {
            position: fixed; top: 65px; width: 100%; height: 45px;
            display: flex; z-index: 9999; background: #111; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .tab-item { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            font-size: 13px; font-weight: 600; color: #666; cursor: pointer; transition: 0.3s; position: relative;
        }
        .tab-item.active { color: #fff; }
        .tab-item.active::after { 
            content: ''; position: absolute; bottom: 0; width: 100%; height: 2px; background: #6200ee; 
        }

        /* 3. 메인 컨테이너 */
        .study-container { 
            height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; padding-top: 110px;
        }
        .study-container::-webkit-scrollbar { display: none; }

        .phrase-block {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            scroll-snap-align: start; position: relative; overflow: hidden;
        }

        .category-tag { 
            position: absolute; top: 150px; font-size: 14px; color: #6200ee; font-weight: 900; letter-spacing: 5px; opacity: 0;
            transform: translateY(-500px) scale(2);
        }

        /* 레이아웃 */
        .mode-horizontal .sentence-area { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        .mode-vertical .sentence-area { display: flex; flex-direction: column; align-items: center; gap: 35px; width: 100%; }

        .chunk-pair { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; opacity: 0; }

        /* 글자 스타일 */
        .chunk { text-align: center; transform: translateY(-500px) scale(2); word-break: keep-all; opacity: 0; }
        .chunk.jp { font-size: 36px; font-weight: 800; color: #fff; }
        .chunk.rd { font-size: 16px; font-weight: 500; color: #888; margin-bottom: 5px; } 
        .chunk.ko { color: #03dac6; font-size: 24px; font-weight: 700; border-top: 2px solid #333; padding-top: 8px; }

        /* 표시 제어 */
        .chunk.jp, .chunk.rd, .chunk.ko { display: none; }
        body.show-all .chunk.jp, body.show-all .chunk.rd, body.show-all .chunk.ko { display: block; }
        body.show-jp .chunk.jp { display: block; }
        body.show-ko .chunk.ko { display: block; border-top: none; padding-top: 0; }

        /* 애니메이션 */
        .phrase-block.active .category-tag,
        .phrase-block.active .chunk { animation: jobsDropImpact 0.5s cubic-bezier(0.2, 0, 0.4, 1.4) forwards; }
        .phrase-block.active .chunk-pair { animation: superShake 0.15s forwards; }

        @keyframes jobsDropImpact {
            0% { opacity: 0; transform: translateY(-500px) scale(2); }
            60% { opacity: 1; transform: translateY(0) scale(1); }
            80% { transform: translateY(-15px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes superShake { 
            0%, 100% { transform: translateY(0); opacity: 1; } 
            50% { transform: translateY(10px); opacity: 1; } 
        }

        /* [수정] 순차적 딜레이 제어 (모두표시 & 일본어만) */
        body.show-all .phrase-block.active .chunk-pair:nth-child(1),
        body.show-all .phrase-block.active .chunk-pair:nth-child(1) .chunk,
        body.show-jp .phrase-block.active .chunk-pair:nth-child(1),
        body.show-jp .phrase-block.active .chunk-pair:nth-child(1) .chunk { animation-delay: 0.1s; }

        body.show-all .phrase-block.active .chunk-pair:nth-child(2),
        body.show-all .phrase-block.active .chunk-pair:nth-child(2) .chunk,
        body.show-jp .phrase-block.active .chunk-pair:nth-child(2),
        body.show-jp .phrase-block.active .chunk-pair:nth-child(2) .chunk { animation-delay: 0.7s; }

        body.show-all .phrase-block.active .chunk-pair:nth-child(3),
        body.show-all .phrase-block.active .chunk-pair:nth-child(3) .chunk,
        body.show-jp .phrase-block.active .chunk-pair:nth-child(3),
        body.show-jp .phrase-block.active .chunk-pair:nth-child(3) .chunk { animation-delay: 1.3s; }

        /* [수정] 한국어 모드: 모든 청크 동시 드롭 유지 */
        body.show-ko .phrase-block.active .chunk-pair,
        body.show-ko .phrase-block.active .chunk { animation-delay: 0.2s !important; }

        /* 먼지 효과 */
        .dust-container { position: absolute; width: 100px; height: 20px; bottom: 0; pointer-events: none; }
        .dust-particle { position: absolute; left: 50%; background: rgba(220, 220, 220, 0.7); border-radius: 50%; filter: blur(6px); opacity: 0; }
        .phrase-block.active .dust-particle { animation: dustBurstImpact 0.8s ease-out forwards; }

        /* 먼지 효과 딜레이 연동 */
        body.show-all .phrase-block.active .chunk-pair:nth-child(1) .dust-particle,
        body.show-jp .phrase-block.active .chunk-pair:nth-child(1) .dust-particle { animation-delay: 0.1s; }
        body.show-all .phrase-block.active .chunk-pair:nth-child(2) .dust-particle,
        body.show-jp .phrase-block.active .chunk-pair:nth-child(2) .dust-particle { animation-delay: 0.7s; }
        body.show-all .phrase-block.active .chunk-pair:nth-child(3) .dust-particle,
        body.show-jp .phrase-block.active .chunk-pair:nth-child(3) .dust-particle { animation-delay: 1.3s; }
        body.show-ko .phrase-block.active .dust-particle { animation-delay: 0.2s !important; }

        @keyframes dustBurstImpact { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(6); } }
    </style>
</head>
<body class="show-all">

        <div class="nav-menu">

            <button id="btn-ver" class="menu-btn" onclick="switchLayout('vertical')">세로형태</button>
        </div>
    </nav>

        <div id="tab-jp" class="tab-item" onclick="setLanguageMode('jp')">일본어만</div>
        <div id="tab-ko" class="tab-item" onclick="setLanguageMode('ko')">한국어만</div>
    </div>

            { id: 31, cat: "화답 및 협력", jp: ["貴重な機会に", "参加させていただき", "ありがとうございました"], rd: ["키쵸오나 키카이니", "산카사세테 이타다키", "아리가토오 고자이마시타"], mn: ["귀중한 기회에", "참가하게 해주셔서", "감사합니다"] }
        ];

        function setLanguageMode(mode) {
            saveCurrentPosition();
            document.body.className = `show-${mode}`;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            renderAndRestore();
        }

        function switchLayout(mode) {
            saveCurrentPosition();
            const view = document.getElementById('study-view');
            document.getElementById('btn-hor').classList.toggle('active', mode === 'horizontal');
            document.getElementById('btn-ver').classList.toggle('active', mode === 'vertical');
            view.className = `study-container mode-${mode}`;
            renderAndRestore();
        }

        function saveCurrentPosition() {
            const blocks = document.querySelectorAll('.phrase-block');
            let closestIndex = 0;
            let minDiff = Infinity;
            blocks.forEach((block, index) => {
                const rect = block.getBoundingClientRect();
                const diff = Math.abs(rect.top);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestIndex = index;
                }
            });
            currentCardIndex = closestIndex;
        }

        function renderAndRestore() {
            render();
            const blocks = document.querySelectorAll('.phrase-block');
            if (blocks[currentCardIndex]) {
                blocks[currentCardIndex].scrollIntoView();
            }
        }

        function createDust(parent) {
            const container = document.createElement('div');
            container.className = 'dust-container';
            for(let i=0; i<12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const dist = 100 + Math.random() * 80;
                const dx = Math.cos(angle) * dist + 'px';
                const dy = (Math.sin(angle) * 40 + 20) + 'px';
                const size = Math.random() * 18 + 6 + 'px';
                const d = document.createElement('div');
                d.className = 'dust-particle';
                d.style.width = size; d.style.height = size;
                d.style.setProperty('--dx', dx); d.style.setProperty('--dy', dy);
                container.appendChild(d);
            }
            parent.appendChild(container);
        }

        function render() {
            const view = document.getElementById('study-view');
            view.innerHTML = '';
            
            phrasesData.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                
                const cat = document.createElement('div');
                cat.className = 'category-tag';
                cat.innerText = p.cat;
                block.appendChild(cat);

                const area = document.createElement('div');
                area.className = 'sentence-area';

                p.jp.forEach((text, i) => {
                    if(!text && !p.rd[i] && !p.mn[i]) return;

                    const pair = document.createElement('div');
                    pair.className = 'chunk-pair';
                    
                    const jp = document.createElement('div');
                    jp.className = 'chunk jp';
                    jp.innerText = text;
                    pair.appendChild(jp);

                    const rd = document.createElement('div');
                    rd.className = 'chunk rd';
                    rd.innerText = p.rd[i];
                    pair.appendChild(rd);

                    const mn = document.createElement('div');
                    mn.className = 'chunk ko';
                    mn.innerText = p.mn[i];
                    pair.appendChild(mn);

                    createDust(pair);
                    area.appendChild(pair);
                });

                block.appendChild(area);
                view.appendChild(block);
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('active');
                        void entry.target.offsetWidth;
                        entry.target.classList.add('active');
                    } else {
                        entry.target.classList.remove('active');
                    }
                });
            }, { threshold: 0.5 });
            document.querySelectorAll('.phrase-block').forEach(b => observer.observe(b));
        }

        window.onload = render;
    </script>
</body>
</html>
