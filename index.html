<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese - ALL IMPACT EDITION</title>
    <style>
        /* --- 공통 및 네비게이션 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .apple-nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 9999; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        .nav-list { display: flex; justify-content: space-around; align-items: center; list-style: none; height: 100%; }
        .nav-mode { color: #fff; opacity: 1; background-color: #6200ee; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }

        /* --- ⚡ 학습모드 (전체 요소 3배 크기 + 동시 낙하 효과) --- */
        .study-container { display: block; height: calc(100vh - 60px); overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; margin-top: 60px; }
        .study-container::-webkit-scrollbar { display: none; }

        .phrase-block {
            height: calc(100vh - 60px); display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px; scroll-snap-align: start; position: relative;
            --study-scale: 3.0; 
        }

        /* [핵심] 모든 문장 요소에 낙하 애니메이션 공통 적용 */
        .category, .japanese, .reading, .meaning {
            opacity: 0; 
            transform: translateY(-500px) scale(2);
            word-break: keep-all;
            transition: none;
        }

        /* 활성화 시 모든 요소 동시 낙하 */
        .phrase-block.active .category,
        .phrase-block.active .japanese,
        .phrase-block.active .reading,
        .phrase-block.active .meaning {
            animation: jobsDropAll 0.5s cubic-bezier(0.2, 0, 0.4, 1.4) forwards;
        }

        @keyframes jobsDropAll {
            0% { opacity: 0; transform: translateY(-500px) scale(2); }
            60% { opacity: 1; transform: translateY(0) scale(1); }
            80% { transform: translateY(-15px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 폰트 스타일 및 3배 크기 적용 */
        .category { font-size: 16px; color: #6200ee; margin-bottom: 20px; letter-spacing: 5px; font-weight: 900; }
        .japanese { font-size: calc(1.2rem * var(--study-scale)); font-weight: 800; line-height: 1.1; margin-bottom: 10px; }
        .reading { font-size: calc(0.5rem * var(--study-scale)); color: #aaa; margin-bottom: 30px; }
        .meaning { 
            font-size: calc(0.9rem * var(--study-scale)); color: #03dac6; 
            font-weight: 700; border-top: 3px solid #333; padding-top: 20px; 
        }

        /* [먼지 효과] 1.5배 넓게, 1.3배 진하게 */
        .dust-container { position: absolute; width: 100%; height: 20px; top: 55%; pointer-events: none; }
        .dust-particle {
            position: absolute; left: 50%; 
            background: rgba(220, 220, 220, 0.7); /* 진한 농도 */
            border-radius: 50%; filter: blur(8px); opacity: 0;
        }

        .phrase-block.active .dust-particle {
            animation: dustBurstImpact 1s ease-out forwards;
            animation-delay: 0.35s;
        }

        @keyframes dustBurstImpact {
            0% { opacity: 0; transform: translate(0, 0) scale(1); }
            20% { opacity: 0.9; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(6); }
        }

        /* 화면 흔들림(강력한 Impact) */
        .phrase-block.active { animation: superShake 0.15s 0.35s 2; }
        @keyframes superShake { 0% { transform: translateY(0); } 50% { transform: translateY(8px); } 100% { transform: translateY(0); } }

    </style>
</head>
<body>

    <nav class="apple-nav">
        <ul class="nav-list">
            <li><span class="nav-mode">학습모드 (IMPACT)</span></li>
        </ul>
    </nav>

    <div class="container">
        <div id="study-view" class="study-container"></div>
    </div>

    <script>
        let phrases = [
            { id: 1, cat: "CONTACT", jp: "お世話になっております。", rd: "오세와니 낫테 오리마스", mn: "신세지고 있습니다" },
            { id: 2, cat: "MEETING", jp: "名刺を頂戴いたします。", rd: "메-시오 쵸-다이 이타시마스", mn: "명함 받겠습니다" },
            { id: 3, cat: "REQUEST", jp: "ご教示いただけますと幸いです。", rd: "고교-지 이타다케마스토 사이와이데스", mn: "알려주시면 감사하겠습니다" },
            { id: 4, cat: "RESPONSE", jp: "承知いたしました。", rd: "쇼-치 이타시마시타", mn: "알겠습니다" },
            { id: 5, cat: "PHONE", jp: "お電話代わりました。", rd: "오뎅와 카와리마시타", mn: "전화 바꿨습니다" },
            { id: 6, cat: "PROPOSAL", jp: "一点、ご提案がございます。", rd: "잇텐 고테이안가 고자이마스", mn: "한 가지 제안드릴 것이 있습니다" }
        ];

        function renderStudyMode() {
            const studyView = document.getElementById('study-view');
            studyView.innerHTML = '';

            phrases.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                
                // 먼지 입자 (총 20개로 증량하여 더 화려하게)
                let dustHTML = '<div class="dust-container">';
                for(let i=0; i<20; i++) {
                    const angle = (i / 20) * Math.PI * 2;
                    const dist = 250 + Math.random() * 200; // 1.5배 이상 확장
                    const dx = Math.cos(angle) * dist + 'px';
                    const dy = (Math.sin(angle) * 100 + 50) + 'px'; 
                    const size = Math.random() * 25 + 10 + 'px';
                    dustHTML += `<div class="dust-particle" style="--dx:${dx}; --dy:${dy}; width:${size}; height:${size}; left:50%"></div>`;
                }
                dustHTML += '</div>';

                block.innerHTML = `
                    <div class="category">${p.cat}</div>
                    <div class="japanese">${p.jp}</div>
                    ${dustHTML}
                    <div class="reading">${p.rd}</div>
                    <div class="meaning">${p.mn}</div>
                `;
                studyView.appendChild(block);
            });

            const studyObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('active');
                        void entry.target.offsetWidth; 
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.phrase-block').forEach(b => studyObserver.observe(b));
        }

        window.onload = renderStudyMode;
    </script>
</body>
</html>
