<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese Impact - Fast Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* 네비게이션 */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            z-index: 9999; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
        }

        .study-container { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none;
        }
        .study-container::-webkit-scrollbar { display: none; }

        .phrase-block {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            scroll-snap-align: start; position: relative; overflow: hidden;
        }

        .category-tag { 
            position: absolute; top: 80px; font-size: 16px; color: #6200ee;
            font-weight: 900; letter-spacing: 5px; opacity: 0;
            transform: translateY(-500px) scale(2);
        }

        .sentence-area { display: flex; flex-direction: column; gap: 50px; width: 100%; }
        .chunk-pair { display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }

        /* --- 강력한 Impact Drop 스타일 --- */
        .chunk {
            opacity: 0; font-size: 42px; font-weight: 800; text-align: center;
            transform: translateY(-500px) scale(2);
            word-break: keep-all;
        }
        .chunk.ko { color: #03dac6; font-size: 32px; font-weight: 700; border-top: 2px solid #333; padding-top: 10px; }

        /* --- 애니메이션 트리거 (1.5배 가속 딜레이 적용) --- */
        .phrase-block.active .category-tag,
        .phrase-block.active .chunk {
            animation: jobsDropImpact 0.5s cubic-bezier(0.2, 0, 0.4, 1.4) forwards;
        }

        .phrase-block.active .category-tag { animation-delay: 0s; }
        .phrase-block.active .chunk-pair:nth-child(1) .chunk { animation-delay: 0.05s; }
        .phrase-block.active .chunk-pair:nth-child(2) .chunk { animation-delay: 0.75s; }
        .phrase-block.active .chunk-pair:nth-child(3) .chunk { animation-delay: 1.45s; }

        @keyframes jobsDropImpact {
            0% { opacity: 0; transform: translateY(-500px) scale(2); }
            60% { opacity: 1; transform: translateY(0) scale(1); }
            80% { transform: translateY(-15px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 가속된 화면 흔들림 싱크 */
        .phrase-block.active .chunk-pair:nth-child(1) { animation: superShake 0.15s 0.35s 2; }
        .phrase-block.active .chunk-pair:nth-child(2) { animation: superShake 0.15s 1.05s 2; }
        .phrase-block.active .chunk-pair:nth-child(3) { animation: superShake 0.15s 1.75s 2; }

        @keyframes superShake { 
            0% { transform: translateY(0); } 
            50% { transform: translateY(10px); } 
            100% { transform: translateY(0); } 
        }

        /* 진한 먼지 효과 가속 싱크 */
        .dust-container { position: absolute; width: 100%; height: 20px; bottom: 10%; pointer-events: none; }
        .dust-particle {
            position: absolute; left: 50%; 
            background: rgba(220, 220, 220, 0.7); 
            border-radius: 50%; filter: blur(8px); opacity: 0;
        }

        .phrase-block.active .chunk-pair:nth-child(1) .dust-particle { animation: dustBurstImpact 1s 0.35s ease-out forwards; }
        .phrase-block.active .chunk-pair:nth-child(2) .dust-particle { animation: dustBurstImpact 1s 1.05s ease-out forwards; }
        .phrase-block.active .chunk-pair:nth-child(3) .dust-particle { animation: dustBurstImpact 1s 1.75s ease-out forwards; }

        @keyframes dustBurstImpact {
            0% { opacity: 0; transform: translate(0, 0) scale(1); }
            20% { opacity: 0.9; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(6); }
        }
    </style>
</head>
<body>

    <nav class="apple-nav">
        <div style="font-weight: 700; letter-spacing: 2px;">BUSINESS JAPANESE IMPACT</div>
    </nav>

    <div id="study-view" class="study-container"></div>

    <script>
        const phrasesData = [
            { cat: "첫 인사", jp: ["初めて", "ご挨拶", "差し上げます。"], mn: ["처음", "인사", "드립니다"] },
            { cat: "첫 인사", jp: ["初めて", "お会いいたします。"], mn: ["처음", "뵙겠습니다"] },
            { cat: "첫 인사", jp: ["初めて", "ご連絡", "差し上げます。"], mn: ["처음", "연락", "드립니다"] },
            { cat: "첫 인사", jp: ["初めて", "メール", "差し上げます。"], mn: ["처음", "메일", "드립니다"] },
            { cat: "첫 인사", jp: ["メールでは挨拶しましたが", "初めて", "お会いいたします。"], mn: ["메일로는 인사드렸습니다만", "처음", "뵙겠습니다"] },
            { cat: "첫 인사", jp: ["初めまして。", "どうぞ", "よろしくお願いします。"], mn: ["처음 뵙겠습니다.", "부디", "잘 부탁드립니다"] },
            { cat: "자기 소개", jp: ["私、", "キムミナと", "申します。"], mn: ["저는", "김미나라고", "합니다"] },
            { cat: "자기 소개", jp: ["鈴木と", "申します。"], mn: ["스즈키라고", "합니다"] },
            { cat: "자기 소개", jp: ["マーケティング部の", "渡辺勇樹과", "申합니다."], mn: ["마케팅부", "와타나베 유키라고", "합니다"] },
            { cat: "자기 소개", jp: ["広報担当의", "太田順と", "申합니다."], mn: ["홍보 담당", "오타 준이라고", "합니다"] },
            { cat: "자기 소개", jp: ["営業部の", "イ・ヒョン시쿠와", "申합니다."], mn: ["영업부의", "이형식이라고", "합니다"] },
            { cat: "자기 소개", jp: ["課長の", "鈴木과", "申합니다."], mn: ["과장인", "스즈키라고", "합니다"] },
            { cat: "안내 및 환대", jp: ["どうぞ、", "こちらへ。"], mn: ["어서", "이쪽으로 오세요"] },
            { cat: "안내 및 환대", jp: ["どうぞ、", "お入りください。"], mn: ["어서", "들어오세요"] },
            { cat: "안내 및 환대", jp: ["どうぞ、", "お召し上がりください。"], mn: ["어서", "드세요"] },
            { cat: "안내 및 환대", jp: ["こちら、", "どうぞ。"], mn: ["이거", "받으세요"] },
            { cat: "안내 및 환대", jp: ["つまらないものですが", "こちら、", "どうぞ。"], mn: ["변변찮습니다만", "이거", "받으세요"] },
            { cat: "안내 및 환대", jp: ["わざわざ、", "ありがとうございます。"], mn: ["일부러", "감사합니다"] },
            { cat: "소개 및 제시", jp: ["こちらは", "部長の", "松本です。"], mn: ["이쪽은", "부장인", "마쓰모토입니다"] },
            { cat: "소개 및 제시", jp: ["韓国からお越しの", "パク・ジンさんで", "いらっしゃいます。"], mn: ["한국에서 오신", "박진 씨", "이십니다"] },
            { cat: "소개 및 제시", jp: ["こちらは、", "新商品で", "ございます。"], mn: ["이쪽은", "신상품", "입니다"] },
            { cat: "소개 및 제시", jp: ["こちらが", "契約書で", "ございます。"], mn: ["이쪽이", "계약서", "입니다"] },
            { cat: "소개 및 제시", jp: ["佐藤さん、こちら", "部長の", "松本です。"], mn: ["사토 씨 이쪽은", "부장인", "마쓰모토입니다"] },
            { cat: "소개 및 제시", jp: ["初めまして。", "部長の", "松本です. "], mn: ["처음 뵙겠습니다.", "부장인", "마쓰모토입니다"] },
            { cat: "소개 및 제시", jp: ["初めまして。", "日本物産の", "佐藤です。"], mn: ["처음 뵙겠습니다.", "일본물산의", "사토입니다"] },
            { cat: "감사 및 화답", jp: ["こちらこそ、", "よろしくお願いします。"], mn: ["저야말로", "잘 부탁드립니다"] },
            { cat: "감사 및 화답", jp: ["こちらこそ、いつも", "お世話に", "なっております。"], mn: ["저야말로 항상", "신세 지고", "있습니다"] },
            { cat: "감사 및 화답", jp: ["おかげさまで", "売上げが", "順調です。"], mn: ["덕분에", "매출이", "순조롭습니다"] },
            { cat: "감사 및 화답", jp: ["今後とも", "ご協力의 호도", "お願いします。"], mn: ["앞으로도", "협조를", "부탁드립니다"] },
            { cat: "감사 및 화답", jp: ["御社が協力した", "おかげで", "成功しました。"], mn: ["귀사가 협력한", "덕분에", "성공했습니다"] },
            { cat: "감사 및 화답", jp: ["貴重な機会に", "参加させて", "いただきました。"], mn: ["귀중한 기회에", "참가하게", "해주셨습니다"] }
        ];

        function createDust(parent) {
            const container = document.createElement('div');
            container.className = 'dust-container';
            for(let i=0; i<20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const dist = 250 + Math.random() * 200; 
                const dx = Math.cos(angle) * dist + 'px';
                const dy = (Math.sin(angle) * 100 + 50) + 'px'; 
                const size = Math.random() * 25 + 10 + 'px';
                const d = document.createElement('div');
                d.className = 'dust-particle';
                d.style.width = size; d.style.height = size;
                d.style.setProperty('--dx', dx);
                d.style.setProperty('--dy', dy);
                container.appendChild(d);
            }
            parent.appendChild(container);
        }

        function render() {
            const view = document.getElementById('study-view');
            phrasesData.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                
                const cat = document.createElement('div');
                cat.className = 'category-tag';
                cat.innerText = p.cat;
                block.appendChild(cat);

                const area = document.createElement('div');
                area.className = 'sentence-area';

                const len = Math.max(p.jp.length, p.mn.length);
                for(let i=0; i<len; i++) {
                    const pair = document.createElement('div');
                    pair.className = 'chunk-pair';
                    
                    if(p.jp[i]) {
                        const jp = document.createElement('div');
                        jp.className = 'chunk jp';
                        jp.innerText = p.jp[i];
                        pair.appendChild(jp);
                    }
                    if(p.mn[i]) {
                        const mn = document.createElement('div');
                        mn.className = 'chunk ko';
                        mn.innerText = p.mn[i];
                        pair.appendChild(mn);
                    }
                    createDust(pair);
                    area.appendChild(pair);
                }
                block.appendChild(area);
                view.appendChild(block);
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('active');
                        void entry.target.offsetWidth; 
                        entry.target.classList.add('active');
                    } else {
                        entry.target.classList.remove('active');
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.phrase-block').forEach(b => observer.observe(b));
        }

        window.onload = render;
    </script>
</body>
</html>
