<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese Impact - Triple Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* 1. 상단 네비게이션 (레이아웃) */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 60px; /* 버튼 높이에 맞춰 소폭 조정 */
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px);
            z-index: 10000; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
        }
        .nav-title { font-weight: 700; font-size: 12px; color: #666; letter-spacing: 1px; }
        .nav-menu { display: flex; gap: 12px; }
        
        /* 버튼 크기 수정: 가로 2배(약 80px -> 160px 범위), 세로 1.5배(약 30px -> 45px) */
        .menu-btn { 
            background: #222; color: #fff; border: none; 
            padding: 8px 24px; /* 가로 패딩 대폭 확대 */
            min-width: 100px; /* 최소 가로폭 확보 */
            height: 40px;    /* 세로 높이 확대 */
            border-radius: 6px; 
            font-size: 13px;  /* 텍스트 크기 약간 확대 */
            font-weight: 500;
            cursor: pointer; 
            transition: 0.2s;
        }
        .menu-btn.active { background: #6200ee; font-weight: bold; }

        /* 2. 3단 언어 제어 탭 */
        .display-tab {
            position: fixed; top: 60px; width: 100%; height: 45px;
            display: flex; z-index: 9999; background: #111; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .tab-item { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            font-size: 13px; font-weight: 600; color: #666; cursor: pointer; transition: 0.3s; position: relative;
        }
        .tab-item.active { color: #fff; }
        .tab-item.active::after { 
            content: ''; position: absolute; bottom: 0; width: 100%; height: 2px; background: #6200ee; 
        }

        .study-container { 
            height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; 
            padding-top: 105px; /* 네비게이션 높이 변화에 따른 조정 */
        }
        .study-container::-webkit-scrollbar { display: none; }

        .phrase-block {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            scroll-snap-align: start; position: relative; overflow: hidden;
        }

        .category-tag { 
            position: absolute; top: 140px; font-size: 14px; color: #6200ee; font-weight: 900; letter-spacing: 5px; opacity: 0;
            transform: translateY(-500px) scale(2);
        }

        /* 레이아웃 모드 */
        .mode-horizontal .sentence-area { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        .mode-vertical .sentence-area { display: flex; flex-direction: column; align-items: center; gap: 40px; width: 100%; }

        .chunk-pair { display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }

        .chunk {
            opacity: 0; font-size: 40px; font-weight: 800; text-align: center;
            transform: translateY(-500px) scale(2); word-break: keep-all;
        }
        .chunk.ko { color: #03dac6; font-size: 26px; font-weight: 700; border-top: 2px solid #333; padding-top: 10px; }

        /* 언어 표시 제어 로직 */
        .chunk.jp, .chunk.ko { display: none; }
        body.show-all .chunk.jp, body.show-all .chunk.ko { display: block; }
        body.show-jp .chunk.jp { display: block; }
        body.show-ko .chunk.ko { display: block; }
        body.show-ko .chunk.ko { border-top: none; padding-top: 0; }

        /* 애니메이션 */
        .phrase-block.active .category-tag,
        .phrase-block.active .chunk { animation: jobsDropImpact 0.5s cubic-bezier(0.2, 0, 0.4, 1.4) forwards; }
        .phrase-block.active .chunk-pair { animation: superShake 0.15s forwards; }

        @keyframes jobsDropImpact {
            0% { opacity: 0; transform: translateY(-500px) scale(2); }
            60% { opacity: 1; transform: translateY(0) scale(1); }
            80% { transform: translateY(-15px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes superShake { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(12px); } }

        /* 순차적 딜레이 싱크 */
        .mode-horizontal .phrase-block.active .chunk-pair:nth-child(1) .chunk, .mode-horizontal .phrase-block.active .chunk-pair:nth-child(1), .mode-horizontal .phrase-block.active .chunk-pair:nth-child(1) .dust-particle { animation-delay: 0.1s; }
        .mode-horizontal .phrase-block.active .chunk-pair:nth-child(2) .chunk, .mode-horizontal .phrase-block.active .chunk-pair:nth-child(2), .mode-horizontal .phrase-block.active .chunk-pair:nth-child(2) .dust-particle { animation-delay: 0.8s; }
        .mode-horizontal .phrase-block.active .chunk-pair:nth-child(3) .chunk, .mode-horizontal .phrase-block.active .chunk-pair:nth-child(3), .mode-horizontal .phrase-block.active .chunk-pair:nth-child(3) .dust-particle { animation-delay: 1.5s; }

        .mode-vertical .phrase-block.active .chunk-pair:nth-child(1) .chunk, .mode-vertical .phrase-block.active .chunk-pair:nth-child(1), .mode-vertical .phrase-block.active .chunk-pair:nth-child(1) .dust-particle { animation-delay: 0.1s; }
        .mode-vertical .phrase-block.active .chunk-pair:nth-child(2) .chunk, .mode-vertical .phrase-block.active .chunk-pair:nth-child(2), .mode-vertical .phrase-block.active .chunk-pair:nth-child(2) .dust-particle { animation-delay: 0.7s; }
        .mode-vertical .phrase-block.active .chunk-pair:nth-child(3) .chunk, .mode-vertical .phrase-block.active .chunk-pair:nth-child(3), .mode-vertical .phrase-block.active .chunk-pair:nth-child(3) .dust-particle { animation-delay: 1.3s; }

        /* 먼지 효과 */
        .dust-container { position: absolute; width: 100px; height: 20px; bottom: 0; pointer-events: none; }
        .dust-particle { position: absolute; left: 50%; background: rgba(220, 220, 220, 0.8); border-radius: 50%; filter: blur(6px); opacity: 0; }
        .phrase-block.active .dust-particle { animation: dustBurstImpact 0.8s ease-out forwards; }
        @keyframes dustBurstImpact { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(6); } }
    </style>
</head>
<body class="show-all">

    <nav class="apple-nav">
        <div class="nav-title">BJ IMPACT</div>
        <div class="nav-menu">
            <button id="btn-hor" class="menu-btn active" onclick="switchLayout('horizontal')">가로형태</button>
            <button id="btn-ver" class="menu-btn" onclick="switchLayout('vertical')">세로형태</button>
        </div>
    </nav>

    <div class="display-tab">
        <div id="tab-all" class="tab-item active" onclick="setLanguageMode('all')">모두표시</div>
        <div id="tab-jp" class="tab-item" onclick="setLanguageMode('jp')">일본어만</div>
        <div id="tab-ko" class="tab-item" onclick="setLanguageMode('ko')">한국어만</div>
    </div>

    <div id="study-view" class="study-container mode-horizontal"></div>

    <script>
        const phrasesData = [
            { cat: "첫 인사", jp: ["初めて", "ご挨拶", "差し上げます。"], mn: ["처음", "인사", "드립니다"] },
            { cat: "자기 소개", jp: ["私、", "キムミナと", "申します。"], mn: ["저는", "김미나라고", "합니다"] },
            { cat: "안내 및 환대", jp: ["どうぞ、", "こちらへ。"], mn: ["어서", "이쪽으로 오세요"] },
            { cat: "소개 및 제시", jp: ["こちらは", "部長の", "松本입니다."], mn: ["이쪽은", "부장인", "마쓰모토입니다"] }
        ];

        function setLanguageMode(mode) {
            document.body.className = `show-${mode}`;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            if(mode === 'all') document.getElementById('tab-all').classList.add('active');
            if(mode === 'jp') document.getElementById('tab-jp').classList.add('active');
            if(mode === 'ko') document.getElementById('tab-ko').classList.add('active');
            resetAndRender();
        }

        function switchLayout(mode) {
            const view = document.getElementById('study-view');
            document.getElementById('btn-hor').classList.toggle('active', mode === 'horizontal');
            document.getElementById('btn-ver').classList.toggle('active', mode === 'vertical');
            view.className = `study-container mode-${mode}`;
            resetAndRender();
        }

        function resetAndRender() {
            const view = document.getElementById('study-view');
            view.scrollTop = 0;
            render();
        }

        function createDust(parent) {
            const container = document.createElement('div');
            container.className = 'dust-container';
            for(let i=0; i<15; i++) {
                const angle = (i / 15) * Math.PI * 2;
                const dist = 120 + Math.random() * 80;
                const dx = Math.cos(angle) * dist + 'px';
                const dy = (Math.sin(angle) * 40 + 20) + 'px';
                const size = Math.random() * 20 + 8 + 'px';
                const d = document.createElement('div');
                d.className = 'dust-particle';
                d.style.width = size; d.style.height = size;
                d.style.setProperty('--dx', dx); d.style.setProperty('--dy', dy);
                container.appendChild(d);
            }
            parent.appendChild(container);
        }

        function render() {
            const view = document.getElementById('study-view');
            view.innerHTML = '';
            phrasesData.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                const cat = document.createElement('div');
                cat.className = 'category-tag';
                cat.innerText = p.cat;
                block.appendChild(cat);

                const area = document.createElement('div');
                area.className = 'sentence-area';

                p.jp.forEach((text, i) => {
                    const pair = document.createElement('div');
                    pair.className = 'chunk-pair';
                    const jp = document.createElement('div');
                    jp.className = 'chunk jp';
                    jp.innerText = text;
                    pair.appendChild(jp);

                    if(p.mn[i]) {
                        const mn = document.createElement('div');
                        mn.className = 'chunk ko';
                        mn.innerText = p.mn[i];
                        pair.appendChild(mn);
                    }
                    createDust(pair);
                    area.appendChild(pair);
                });
                block.appendChild(area);
                view.appendChild(block);
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('active');
                        void entry.target.offsetWidth;
                        entry.target.classList.add('active');
                    } else {
                        entry.target.classList.remove('active');
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.phrase-block').forEach(b => observer.observe(b));
        }

        window.onload = render;
    </script>
</body>
</html>
