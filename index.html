<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese Pro - QUANTUM Edition</title>
    <style>
        /* --- 공통 스타일 (Apple Reset) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", sans-serif;
            line-height: 1.5; user-select: none; overflow-x: hidden;
            perspective: 1500px; /* 3D 효과를 위한 원근감 설정 */
        }

        /* --- 네비게이션 --- */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            z-index: 9999; border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
        }
        .nav-list { display: flex; justify-content: space-around; align-items: center; list-style: none; height: 100%; padding: 0 10px; }
        .nav-link { color: #f5f5f7; font-size: 14px; opacity: 0.5; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link.active { opacity: 1; font-weight: 600; color: #00ffcc; /* Quantum Neon */ }
        .nav-mode { 
            color: #fff; opacity: 0.5; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 4px 12px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .nav-mode.active { opacity: 1; background-color: #00ffcc; color: #000; border-color: #00ffcc; }

        /* --- 컨테이너 --- */
        .container { padding-top: 60px; max-width: 800px; margin: 0 auto; min-height: 100vh; }
        .hero-section { padding: 40px 20px 20px; text-align: center; }
        .hero-section h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; text-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .hero-section p { color: #86868b; font-size: 15px; margin-top: 8px; }

        /* --- [1] 리스트 모드 스타일 --- */
        .list-container { margin-top: 20px; border-top: 0.5px solid #2c2c2e; display: none; }
        .list-item-wrapper { 
            position: relative; background-color: #00ffcc; overflow: visible; border-bottom: 0.5px solid #2c2c2e; 
        }
        .list-item-content {
            position: relative; width: 100%; padding: 18px 20px; background-color: #000; z-index: 2;
            cursor: grab; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }
        .category { font-size: 10px; color: #00ffcc; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .japanese { font-size: 18px; font-weight: 500; color: #fff; }
        .reading { font-size: 13px; color: #86868b; }
        .meaning { font-size: 16px; color: #f5f5f7; margin-top: 4px; }
        
        .delete-label {
            position: absolute; right: 0; top: 0; height: 100%; width: 80px;
            background-color: #00ffcc; color: black; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; z-index: 1; cursor: pointer;
        }

        /* 양자 붕괴 진행 중 원본 숨김 */
        .decaying { visibility: hidden !important; pointer-events: none !important; }

        /* ⚛️ 큐브 파편 스타일 */
        .quantum-cube {
            position: fixed; pointer-events: none; z-index: 10000;
            background-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
            transform-style: preserve-3d;
        }

        /* --- [2] 학습 모드 스타일 --- */
        .study-container { display: none; padding-bottom: 100px; }
        .phrase-block {
            height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
            opacity: 0.1; transform: scale(0.8);
        }
        .phrase-block.active { opacity: 1; transform: scale(1.1); }
        .phrase-block .japanese { font-size: 2.5rem; margin-bottom: 15px; }
        .phrase-block .meaning { font-size: 1.8rem; }
        
        footer { padding: 60px 20px; text-align: center; color: #424245; font-size: 12px; }
    </style>
</head>
<body>

    <nav class="apple-nav">
        <ul class="nav-list">
            <li><span id="btn-study" class="nav-mode" onclick="enableStudyMode()">학습모드</span></li>
            <li><a id="link-all" class="nav-link active" onclick="filterList('all', this)">전부</a></li>
            <li><a class="nav-link" onclick="filterList('jp', this)">일본어</a></li>
            <li><a class="nav-link" onclick="filterList('ko', this)">한국어</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="hero-section" id="hero">
            <h1 id="hero-title">Phrases</h1>
            <p id="hero-desc">암기한 문장을 양자 단위(Quantum)로 분해하세요.</p>
        </section>

        <div id="list-view" class="list-container"></div>
        <div id="study-view" class="study-container"></div>
    </div>

    <footer id="footer">
        <p>© 2026 Business Japanese Professional.</p>
    </footer>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script>
        let phrases = [
            { id: 1, cat: "인사 및 연락", jp: "お世話になっております。", rd: "오세와니 낫테 오리마스", mn: "신세지고 있습니다" },
            { id: 2, cat: "인사 및 연락", jp: "お疲れ様でございます。", rd: "오츠카레사마데 고자이마스", mn: "수고 많으십니다" },
            { id: 3, cat: "방문 및 회의", jp: "名刺を頂戴いたします。", rd: "메-시오 쵸-다이 이타시마스", mn: "명함 받겠습니다" },
            { id: 4, cat: "요청 및 문의", jp: "ご教示いただけますと幸いです。", rd: "고교-지 이타다케마스토 사이와이데스", mn: "알려주시면 감사하겠습니다" },
            { id: 5, cat: "승낙 및 거절", jp: "承知いたしました。", rd: "쇼-치 이타시마시타", mn: "알겠습니다" },
            { id: 6, cat: "사과 및 감사", jp: "誠に申し訳ございません。", rd: "마코토니 모-시와케 고자이마센", mn: "진심으로 사과드립니다" }
        ];

        let currentMode = 'all';
        let activeSwipeContent = null;
        let observer = null;
        let isDecaying = false;

        function enableStudyMode() {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-study').classList.add('active');
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('study-view').style.display = 'block';
            document.getElementById('hero-title').innerText = "Study Mode";
            renderStudyMode();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterList(type, element) {
            document.getElementById('btn-study').classList.remove('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('study-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('hero-title').innerText = type === 'all' ? "Phrases" : (type === 'jp' ? "日本語" : "한국어");
            renderList(type);
        }

        function renderList(type) {
            currentMode = type;
            const listView = document.getElementById('list-view');
            listView.innerHTML = '';
            phrases.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = 'list-item-wrapper';
                wrapper.setAttribute('data-id', p.id);
                let html = `<div class="list-item-content"><div class="category">${p.cat}</div>`;
                if (type === 'all' || type === 'jp') {
                    html += `<div class="japanese">${p.jp}</div>`;
                    if(type !== 'ko') html += `<div class="reading">${p.rd}</div>`;
                }
                if (type === 'all' || type === 'ko') {
                    html += `<div class="meaning">${p.mn}</div>`;
                }
                html += `</div><div class="delete-label" onclick="initDecay(${p.id})">DECAY</div>`;
                wrapper.innerHTML = html;
                setupSwipe(wrapper, p.id);
                listView.appendChild(wrapper);
            });
        }

        function setupSwipe(wrapper, id) {
            const content = wrapper.querySelector('.list-item-content');
            let startX = 0, isDragging = false, currentDiff = 0;
            const qdThreshold = window.innerWidth * 0.65;

            const start = (e) => {
                if (isDecaying) return;
                if (activeSwipeContent && activeSwipeContent !== content) activeSwipeContent.style.transform = 'translateX(0px)';
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                content.style.transition = 'none';
            };
            const move = (e) => {
                if (!isDragging) return;
                currentDiff = startX - (e.type.includes('mouse') ? e.pageX : e.touches[0].clientX);
                if (currentDiff > 0) {
                    content.style.transform = `translateX(-${currentDiff}px)`;
                    wrapper.style.backgroundColor = currentDiff > qdThreshold ? "#fff" : "#00ffcc"; 
                }
            };
            const end = () => {
                if (!isDragging) return;
                isDragging = false;
                content.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                if (currentDiff > qdThreshold) {
                    initDecay(id);
                } else if (currentDiff > 70) {
                    content.style.transform = 'translateX(-80px)';
                    activeSwipeContent = content;
                } else {
                    content.style.transform = 'translateX(0px)';
                }
            };

            content.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            content.addEventListener('touchstart', start);
            content.addEventListener('touchmove', move);
            content.addEventListener('touchend', end);
        }

        // --- ⚛️ THE QUANTUM DECAY LOGIC ---
        async function initDecay(id) {
            if (isDecaying) return;
            const wrapper = document.querySelector(`.list-item-wrapper[data-id="${id}"]`);
            const content = wrapper.querySelector('.list-item-content');
            if(!wrapper) return;

            isDecaying = true;

            // 1. 현재 행 캡처 (픽셀 색상 추출용)
            const canvas = await html2canvas(content, { backgroundColor: null, scale: 1 });
            const rect = content.getBoundingClientRect();
            
            // 2. 원본 행 숨기기
            content.classList.add('decaying');
            wrapper.style.backgroundColor = 'transparent';

            // 3. 양자 큐브 생성
            const container = document.createElement('div');
            document.body.appendChild(container);
            
            const rows = 4, cols = 10; 
            const cubeSize = rect.width / cols;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cube = document.createElement('div');
                    cube.className = 'quantum-cube';
                    cube.style.width = cubeSize + 'px';
                    cube.style.height = (rect.height / rows) + 'px';
                    cube.style.left = (rect.left + c * cubeSize) + 'px';
                    cube.style.top = (rect.top + r * (rect.height / rows)) + 'px';
                    
                    // 각 큐브마다 랜덤한 3D 궤적 설정 (화면 밖으로 튀어나옴)
                    const moveX = (Math.random() - 0.5) * 500;
                    const moveY = (Math.random() - 0.5) * 500;
                    const moveZ = 1000 + Math.random() * 2000; // Z축으로 튀어나옴
                    const rotateX = Math.random() * 720;
                    const rotateY = Math.random() * 720;

                    container.appendChild(cube);
                    
                    cube.animate([
                        { 
                            transform: 'translateZ(0) rotateX(0) rotateY(0)', 
                            opacity: 1,
                            filter: 'brightness(1) blur(0px)'
                        },
                        { 
                            transform: `translate3d(${moveX}px, ${moveY}px, ${moveZ}px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`, 
                            opacity: 0,
                            filter: 'brightness(3) blur(4px)'
                        }
                    ], {
                        duration: 1000 + Math.random() * 1000,
                        easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                        fill: 'forwards'
                    });
                }
            }

            // 4. 애니메이션 완료 후 정리
            setTimeout(() => {
                container.remove();
                phrases = phrases.filter(p => p.id !== id);
                if (document.getElementById('study-view').style.display === 'block') renderStudyMode();
                else renderList(currentMode);
                isDecaying = false;
                activeSwipeContent = null;
            }, 1500);
        }

        function renderStudyMode() {
            const studyView = document.getElementById('study-view');
            studyView.innerHTML = '';
            if (observer) observer.disconnect();

            phrases.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                block.innerHTML = `
                    <div class="category">${p.cat}</div>
                    <div class="japanese">${p.jp}</div>
                    <div class="reading">${p.rd}</div>
                    <div class="meaning">${p.mn}</div>
                `;
                studyView.appendChild(block);
            });

            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                    else entry.target.classList.remove('active');
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.phrase-block').forEach(b => observer.observe(b));
        }

        filterList('all', document.getElementById('link-all'));
    </script>
</body>
</html>
