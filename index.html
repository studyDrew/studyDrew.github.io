<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Japanese - Apple Style</title>
    <style>
        /* Apple-style Reset & Typography */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- Apple Navigation Bar Style --- */
        .apple-nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 800px; 
            margin: 0 auto;
            height: 100%;
        }

        .nav-list {
            display: flex;
            justify-content: space-around; 
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0 22px;
            height: 100%;
        }

        .nav-link {
            text-decoration: none;
            color: #f5f5f7;
            font-size: 24px;
            font-weight: 500;
            opacity: 0.5;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .nav-link.active, .nav-link:hover {
            opacity: 1;
        }

        /* Hero Section */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 60px;
        }
        .hero h1 { font-size: 3rem; font-weight: 600; letter-spacing: -0.02em; }
        .hero p { color: #86868b; margin-top: 10px; font-size: 1.2rem; }

        /* Scroll Container */
        .phrase-container {
            padding: 0 10vw;
            min-height: 100vh;
        }

        /* Each Phrase Block */
        .phrase-block {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
            opacity: 0.1;
            transform: scale(0.85);
        }

        .phrase-block.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .category {
            font-size: 0.9rem;
            color: #2997ff;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .japanese {
            font-size: 2.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .reading {
            font-size: 1.2rem;
            color: #86868b;
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 1.8rem;
            color: #f5f5f7;
        }

        footer { height: 30vh; display: flex; align-items: center; justify-content: center; color: #424245; }
    </style>
</head>
<body>

    <nav class="apple-nav">
        <div class="nav-content">
            <ul class="nav-list">
                <li><a class="nav-link active" onclick="filterPhrases('all', this)">すべて</a></li>
                <li><a class="nav-link" onclick="filterPhrases('jp', this)">日本語のみ</a></li>
                <li><a class="nav-link" onclick="filterPhrases('ko', this)">韓国語のみ</a></li>

    </nav>

    <footer>
        <p>© 2026 Business Japanese Professional.</p>

            { cat: "요청 및 문의", jp: "締め切りを延ばしていただけますか。", rd: "시메키리오 노바시테 이타다케마스카", mn: "마감 기한을 연장해 주시겠습니까?" },

        const contentDiv = document.getElementById('content');
        let observer;

        function renderPhrases(mode) {
            contentDiv.innerHTML = '';
            if (observer) observer.disconnect();

            phrases.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                
                let htmlContent = `<div class="category">${p.cat}</div>`;

                if (mode === 'all') {
                    // 모두 표시 (전체 데이터)
                    htmlContent += `
                        <div class="japanese">${p.jp}</div>
                        <div class="reading">${p.rd}</div>
                        <div class="meaning">${p.mn}</div>
                    `;
                } else if (mode === 'jp') {
                    // 일본어만 (발음 rd 제외)
                    htmlContent += `
                        <div class="japanese" style="font-size: 3.5rem; margin-bottom: 0;">${p.jp}</div>
                    `;
                } else if (mode === 'ko') {
                    // 한국어만
                    htmlContent += `
                        <div class="meaning" style="font-size: 3.5rem; color: #fff;">${p.mn}</div>
                    `;
                }
                
                block.innerHTML = htmlContent;
                contentDiv.appendChild(block);
            });

            setupObserver();
        }

        function setupObserver() {
            const options = { threshold: 0.6 };
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                    else entry.target.classList.remove('active');
                });
            }, options);

            document.querySelectorAll('.phrase-block').forEach(block => observer.observe(block));
        }

        function filterPhrases(mode, element) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            element.classList.add('active');

            const title = document.getElementById('hero-title');
            if(mode === 'jp') title.innerText = "日本語のみ";
            else if(mode === 'ko') title.innerText = "韓国語のみ";
            else title.innerText = "Essential Phrases";

            renderPhrases(mode);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderPhrases('all');
