<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese Pro - BIG FONT EDITION</title>
    <style>
        /* --- 공통 스타일 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", sans-serif;
            line-height: 1.5; user-select: none; overflow-x: hidden;
        }

        /* --- 네비게이션 --- */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            z-index: 9999; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .nav-list { display: flex; justify-content: space-around; align-items: center; list-style: none; height: 100%; padding: 0 10px; }
        .nav-link { color: #f5f5f7; font-size: 14px; opacity: 0.5; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link.active { opacity: 1; font-weight: 600; color: #6200ee; text-shadow: 0 0 8px #6200ee; }
        .nav-mode { 
            color: #fff; opacity: 0.5; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 4px 12px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.2s;
        }
        .nav-mode.active { opacity: 1; background-color: #6200ee; color: #fff; border-color: #6200ee; box-shadow: 0 0 10px rgba(98, 0, 238, 0.4); }

        /* --- 컨테이너 --- */
        .container { padding-top: 60px; max-width: 800px; margin: 0 auto; min-height: 100vh; }
        
        /* --- 리스트 모드 스타일 --- */
        .list-container { margin-top: 20px; border-top: 0.5px solid #2c2c2e; display: none; }
        .list-item-wrapper { position: relative; background: #6200ee; overflow: hidden; border-bottom: 0.5px solid #2c2c2e; }
        .list-item-content {
            position: relative; width: 100%; padding: 22px 20px; background-color: #000; z-index: 2;
            cursor: grab; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .category { font-size: 10px; color: #03dac6; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .japanese { font-size: 19px; font-weight: 500; color: #fff; }
        .reading { font-size: 13px; color: #86868b; }
        .meaning { font-size: 16px; color: #f5f5f7; margin-top: 6px; border-top: 0.5px solid #1c1c1e; padding-top: 6px; }
        .delete-label {
            position: absolute; right: 0; top: 0; height: 100%; width: 80px;
            background: transparent; color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; z-index: 1;
        }

        .singularity-active { animation: singularityShrinkWarp 0.2s ease-in forwards; pointer-events: none; }
        @keyframes singularityShrinkWarp { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        /* --- ⚡ 학습모드 (이탈 방지 로직 적용) --- */
        .study-container { 
            display: none; height: calc(100vh - 60px); overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
        }
        .study-container::-webkit-scrollbar { display: none; }

        @property --study-scale {
          syntax: '<number>';
          inherits: true;
          initial-value: 2.0;
        }

        .phrase-block {
            height: calc(100vh - 60px); display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 24px; scroll-snap-align: start;
            opacity: 0.05; transform: scale(0.9);
            transition: opacity 0.5s ease, transform 0.5s ease;
            --study-scale: 2.0;
        }

        @keyframes fontGrow {
            from { --study-scale: 2.0; }
            to { --study-scale: 3.2; } /* 이탈 방지를 위해 최대치를 3.2로 살짝 조정 */
        }

        .phrase-block.active { 
            opacity: 1; 
            transform: scale(1); 
            animation: fontGrow 0.8s ease-out forwards; /* 속도감 있게 0.8초 설정 */
        }

        .phrase-block .japanese { 
            font-size: calc(1.05rem * var(--study-scale)); 
            line-height: 1.25; font-weight: 700; margin-bottom: 12px;
            width: 100%; max-width: 90vw;
            word-break: break-all; overflow-wrap: break-word; /* 긴 문장 자동 줄바꿈 */
        }
        .phrase-block .meaning { 
            font-size: calc(0.85rem * var(--study-scale)); 
            color: #03dac6; border-top: 1px solid #333; padding-top: 15px; 
            font-weight: 600; width: 100%; max-width: 90vw;
            word-break: keep-all;
        }
        .phrase-block .reading { font-size: 1.1rem; color: #86868b; margin-bottom: 20px; }
        .phrase-block .category { font-size: 12px; color: #6200ee; margin-bottom: 20px; letter-spacing: 2px; }

        .hero-section { padding: 40px 20px 20px; text-align: center; }
        .hero-section h1 { font-size: 32px; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="apple-nav">
        <ul class="nav-list">
            <li><span id="btn-study" class="nav-mode" onclick="enableStudyMode()">학습모드</span></li>
            <li><a id="link-all" class="nav-link" onclick="filterList('all', this)">전부</a></li>
            <li><a class="nav-link" onclick="filterList('jp', this)">일본어</a></li>
            <li><a class="nav-link" onclick="filterList('ko', this)">한국어</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="hero-section" id="hero" style="display:none;">
            <h1 id="hero-title">Phrases</h1>
            <p id="hero-desc">비즈니스 일본어 마스터를 위한 싱귤래리티.</p>
        </section>
        <div id="list-view" class="list-container"></div>
        <div id="study-view" class="study-container"></div>
    </div>

    <script>
        let phrases = [
            { id: 1, cat: "인사 및 연락", jp: "お世話になっております。", rd: "오세와니 낫테 오리마스", mn: "신세지고 있습니다" },
            { id: 2, cat: "인사 및 연락", jp: "お疲れ様でございます。", rd: "오츠카레사마데 고자이마스", mn: "수고 많으십니다" },
            { id: 3, cat: "방문 및 회의", jp: "名刺を頂戴いたします。", rd: "메-시오 쵸-다이 이타시마스", mn: "명함 받겠습니다" },
            { id: 4, cat: "요청 및 문의", jp: "ご教示いただけますと幸いです。", rd: "고교-지 이타다케마스토 사이와이데스", mn: "알려주시면 감사하겠습니다" },
            { id: 5, cat: "승낙 및 거절", jp: "承知いたしました。", rd: "쇼-치 이타시마시타", mn: "알겠습니다" },
            { id: 6, cat: "사과 및 감사", jp: "誠に申し訳ございません。", rd: "마코토니 모-시와케 고자이마센", mn: "진심으로 사과드립니다" }
        ];

        let currentMode = 'all', isWarping = false, studyObserver = null;

        function enableStudyMode() {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-study').classList.add('active');
            document.getElementById('hero').style.display = 'none';
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('study-view').style.display = 'block';
            renderStudyMode();
        }

        function filterList(type, element) {
            document.getElementById('btn-study').classList.remove('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('hero').style.display = 'block';
            document.getElementById('study-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            renderList(type);
        }

        function renderList(type) {
            currentMode = type;
            const listView = document.getElementById('list-view');
            listView.innerHTML = '';
            phrases.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = 'list-item-wrapper';
                wrapper.setAttribute('data-id', p.id);
                wrapper.innerHTML = `
                    <div class="list-item-content">
                        <div class="category">${p.cat}</div>
                        ${(type==='all' || type==='jp') ? `<div class="japanese">${p.jp}</div><div class="reading">${p.rd}</div>` : ''}
                        ${(type==='all' || type==='ko') ? `<div class="meaning">${p.mn}</div>` : ''}
                    </div>
                    <div class="delete-label" onclick="initSingularity(${p.id})">WIPE</div>
                `;
                setupSwipe(wrapper, p.id);
                listView.appendChild(wrapper);
            });
        }

        function setupSwipe(wrapper, id) {
            const content = wrapper.querySelector('.list-item-content');
            let startX = 0, currentDiff = 0, isDragging = false;
            const start = (e) => {
                if (isWarping) return;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                content.style.transition = 'none';
                isDragging = true;
            };
            const move = (e) => {
                if (!isDragging) return;
                const x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                currentDiff = startX - x;
                if (currentDiff > 0) content.style.transform = `translateX(-${currentDiff}px)`;
            };
            const end = () => {
                if (!isDragging) return;
                isDragging = false;
                content.style.transition = 'transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)';
                if (currentDiff > window.innerWidth * 0.5) initSingularity(id);
                else if (currentDiff > 70) content.style.transform = 'translateX(-80px)';
                else content.style.transform = 'translateX(0px)';
            };
            content.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            content.addEventListener('touchstart', start);
            content.addEventListener('touchmove', move);
            content.addEventListener('touchend', end);
        }

        function initSingularity(id) {
            if (isWarping) return;
            const wrapper = document.querySelector(`.list-item-wrapper[data-id="${id}"]`);
            if(!wrapper) return;
            isWarping = true;
            wrapper.querySelector('.list-item-content').classList.add('singularity-active');
            setTimeout(() => {
                phrases = phrases.filter(p => p.id !== id);
                renderList(currentMode);
                isWarping = false;
            }, 220);
        }

        function renderStudyMode() {
            const studyView = document.getElementById('study-view');
            studyView.innerHTML = '';
            if (studyObserver) studyObserver.disconnect();

            phrases.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                block.innerHTML = `
                    <div class="category">${p.cat}</div>
                    <div class="japanese">${p.jp}</div>
                    <div class="reading">${p.rd}</div>
                    <div class="meaning">${p.mn}</div>
                `;
                studyView.appendChild(block);
            });

            studyObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    } else {
                        entry.target.classList.remove('active');
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.phrase-block').forEach(b => studyObserver.observe(b));
        }

        window.onload = enableStudyMode;
    </script>
</body>
</html>
