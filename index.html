<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese Pro - SNAP Edition</title>
    <style>
        /* --- 공통 스타일 (Apple Reset) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", sans-serif;
            line-height: 1.5; user-select: none; overflow-x: hidden;
        }

        /* --- 네비게이션 --- */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            z-index: 9999; border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
        }
        .nav-list { display: flex; justify-content: space-around; align-items: center; list-style: none; height: 100%; padding: 0 10px; }
        .nav-link { color: #f5f5f7; font-size: 14px; opacity: 0.5; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link.active { opacity: 1; font-weight: 600; color: #a29bfe; /* Snap Purple */ }
        .nav-mode { 
            color: #fff; opacity: 0.5; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 4px 12px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .nav-mode.active { opacity: 1; background-color: #fff; color: #000; }

        /* --- 컨테이너 --- */
        .container { padding-top: 60px; max-width: 800px; margin: 0 auto; min-height: 100vh; }
        .hero-section { padding: 40px 20px 20px; text-align: center; }
        .hero-section h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
        .hero-section p { color: #86868b; font-size: 15px; margin-top: 8px; }

        /* --- [1] 리스트 모드 스타일 --- */
        .list-container { margin-top: 20px; border-top: 0.5px solid #2c2c2e; display: none; position: relative;}
        
        .list-item-wrapper { 
            position: relative; background-color: #ff3b30; overflow: hidden; border-bottom: 0.5px solid #2c2c2e; 
            transition: background-color 0.3s;
        }

        /* 스냅 애니메이션 중에는 행을 숨김 */
        .list-item-wrapper.snapping {
            visibility: hidden;
            pointer-events: none;
        }

        .list-item-content {
            position: relative; width: 100%; padding: 18px 20px; background-color: #000; z-index: 2;
            cursor: grab; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            /* html2canvas가 숨겨진 요소를 캡처할 수 있도록 visibility는 유지 */
        }
        
        .category { font-size: 10px; color: #2997ff; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .japanese { font-size: 18px; font-weight: 500; color: #fff; word-break: keep-all;}
        .reading { font-size: 13px; color: #86868b; }
        .meaning { font-size: 16px; color: #f5f5f7; margin-top: 4px; }
        
        .delete-label {
            position: absolute; right: 0; top: 0; height: 100%; width: 80px;
            background-color: #ff3b30; color: white; display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 600; z-index: 1; cursor: pointer;
        }

        /* Canvas Container for Particles */
        #particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* --- [2] 학습 모드 스타일 --- */
        .study-container { display: none; padding-bottom: 100px; }
        .phrase-block {
            height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
            opacity: 0.1; transform: scale(0.8);
        }
        .phrase-block.active { opacity: 1; transform: scale(1.1); }
        .phrase-block .japanese { font-size: 2.5rem; margin-bottom: 15px; }
        .phrase-block .meaning { font-size: 1.8rem; }
        
        footer { padding: 60px 20px; text-align: center; color: #424245; font-size: 12px; }
    </style>
</head>
<body>

    <nav class="apple-nav">
        <ul class="nav-list">
            <li><span id="btn-study" class="nav-mode" onclick="enableStudyMode()">학습모드</span></li>
            <li><a id="link-all" class="nav-link active" onclick="filterList('all', this)">전부</a></li>
            <li><a class="nav-link" onclick="filterList('jp', this)">일본어</a></li>
            <li><a class="nav-link" onclick="filterList('ko', this)">한국어</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="hero-section" id="hero">
            <h1 id="hero-title">Phrases</h1>
            <p id="hero-desc">암기한 문장을 먼지로 만들어버리세요 (SNAP).</p>
        </section>

        <div id="list-view" class="list-container">
            <div id="particle-container"></div>
        </div>

        <div id="study-view" class="study-container"></div>
    </div>

    <footer id="footer">
        <p>© 2026 Business Japanese Professional.</p>
    </footer>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script>
        let phrases = [
            { id: 1, cat: "인사 및 연락", jp: "お世話になっております。", rd: "오세와니 낫테 오리마스", mn: "신세지고 있습니다" },
            { id: 2, cat: "인사 및 연락", jp: "お疲れ様でございます。", rd: "오츠카레사마데 고자이마스", mn: "수고 많으십니다" },
            { id: 3, cat: "방문 및 회의", jp: "名刺을 頂戴いたします。", rd: "메-시오 쵸-다이 이타시마스", mn: "명함 받겠습니다" },
            { id: 4, cat: "요청 및 문의", jp: "ご教示いただけますと幸いです。", rd: "고교-지 이타다케마스토 사이와이데스", mn: "알려주시면 감사하겠습니다" },
            { id: 5, cat: "승낙 및 거절", jp: "承知いたしました。", rd: "쇼-치 이타시마시타", mn: "알겠습니다" },
            { id: 6, cat: "사과 및 감사", jp: "誠に申し訳ございません。", rd: "마코토니 모-시와케 고자이마센", mn: "진심으로 사과드립니다" }
        ];

        let currentMode = 'all';
        let activeSwipeContent = null;
        let observer = null;
        let isSnapping = false; // 애니메이션 중 중복 동작 방지

        // --- 모드 전환 함수 ---
        function enableStudyMode() {
            if(isSnapping) return;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-study').classList.add('active');
            
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('study-view').style.display = 'block';
            document.getElementById('hero-title').innerText = "Study Mode";
            renderStudyMode();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterList(type, element) {
            if(isSnapping) return;
            document.getElementById('btn-study').classList.remove('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('study-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('hero-title').innerText = type === 'all' ? "Phrases" : (type === 'jp' ? "日本語" : "한국어");
            renderList(type);
        }

        // --- [1] 리스트 렌더링 & 인터랙션 ---
        function renderList(type) {
            currentMode = type;
            const listView = document.getElementById('list-view');
            // 캔버스 컨테이너는 유지하고 리스트 아이템만 초기화
            const items = listView.querySelectorAll('.list-item-wrapper');
            items.forEach(item => item.remove());

            phrases.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = 'list-item-wrapper';
                wrapper.setAttribute('data-id', p.id);
                let html = `<div class="list-item-content"><div class="category">${p.cat}</div>`;
                if (type === 'all' || type === 'jp') {
                    html += `<div class="japanese">${p.jp}</div>`;
                    if(type !== 'ko') html += `<div class="reading">${p.rd}</div>`;
                }
                if (type === 'all' || type === 'ko') {
                    html += `<div class="meaning">${p.mn}</div>`;
                }
                html += `</div><div class="delete-label" onclick="initSnap(${p.id})">SNAP</div>`;
                wrapper.innerHTML = html;
                setupSwipe(wrapper, p.id);
                listView.appendChild(wrapper);
            });
        }

        function setupSwipe(wrapper, id) {
            const content = wrapper.querySelector('.list-item-content');
            let startX = 0, isDragging = false, currentDiff = 0;
            const qdThreshold = window.innerWidth * 0.65; // 65% 이상 밀면 스냅

            const start = (e) => {
                if(isSnapping || wrapper.classList.contains('snapping')) return;
                if (activeSwipeContent && activeSwipeContent !== content) activeSwipeContent.style.transform = 'translateX(0px)';
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                content.style.transition = 'none';
            };
            const move = (e) => {
                if (!isDragging) return;
                currentDiff = startX - (e.type.includes('mouse') ? e.pageX : e.touches[0].clientX);
                if (currentDiff > 0) {
                    content.style.transform = `translateX(-${currentDiff}px)`;
                    // 배경색 피드백 (타노스 퍼플)
                    wrapper.style.backgroundColor = currentDiff > qdThreshold ? "#a29bfe" : "#ff3b30"; 
                }
            };
            const end = () => {
                if (!isDragging) return;
                isDragging = false;
                content.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                if (currentDiff > qdThreshold) {
                    initSnap(id);
                } else if (currentDiff > 70) {
                    content.style.transform = 'translateX(-80px)';
                    activeSwipeContent = content;
                } else {
                    content.style.transform = 'translateX(0px)';
                }
            };

            content.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            content.addEventListener('touchstart', start);
            content.addEventListener('touchmove', move);
            content.addEventListener('touchend', end);
        }

        // --- 🌪️ The Thanos Snap Effect (Particle Physics) ---

        // 입자 객체 정의
        class Particle {
            constructor(x, y, color, canvasWidth, canvasHeight) {
                this.x = x;
                this.y = y;
                this.color = color;
                // 초기 속도: 사방으로 퍼지되 위쪽/왼쪽으로 약간 더 강하게
                this.speedX = (Math.random() - 0.7) * 8; 
                this.speedY = (Math.random() - 0.6) * 12; 
                // 회전
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.4;
                // 중력 및 마찰
                this.gravity = 0.15;
                this.friction = 0.96;
                // 수명 및 크기 감소
                this.size = Math.random() * 2.5 + 0.5;
                this.death = 80 + Math.random() * 40; // 수명 프레임 수
                this.life = 0;
                this.opacity = 1;
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
            }

            update() {
                // 물리 법칙 적용
                this.speedY += this.gravity;
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.spin;
                
                // 수명 관리 및 크기/투명도 감소
                this.life++;
                if (this.life >= this.death) {
                    this.size *= 0.9;
                    this.opacity *= 0.8;
                }
            }

            draw(ctx) {
                if (this.opacity < 0.05 || this.size < 0.1) return false;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`;
                
                // 사각형 입자 그리기
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                
                ctx.restore();
                return true;
            }
        }

        // 스냅 효과 초기화
        function initSnap(id) {
            if(isSnapping) return;
            const wrapper = document.querySelector(`.list-item-wrapper[data-id="${id}"]`);
            if(!wrapper) return;

            const content = wrapper.querySelector('.list-item-content');
            isSnapping = true;
            activeSwipeContent = null;

            // html2canvas로 행 캡처
            html2canvas(content, {
                backgroundColor: null,
                logging: false,
                scale: 1, // 퍼포먼스를 위해 1배율
                useCORS: true
            }).then(canvas => {
                // 캡처 완료 후 원본 행 숨기기
                wrapper.classList.add('snapping');
                wrapper.style.backgroundColor = 'transparent';

                // 캔버스 설정
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;

                // 입자 생성 컨테이너
                const container = document.getElementById('particle-container');
                const wrapperRect = wrapper.getBoundingClientRect();
                const containerRect = document.getElementById('list-view').getBoundingClientRect();

                // 애니메이션용 캔버스 생성
                const animationCanvas = document.createElement('canvas');
                animationCanvas.width = canvas.width * 2; // 확산을 고려해 넉넉하게
                animationCanvas.height = canvas.height * 3;
                animationCanvas.style.position = 'absolute';
                // 컨테이너 내에서 원본 행의 위치에 맞춤
                animationCanvas.style.left = (wrapperRect.left - containerRect.left - canvas.width / 2) + 'px';
                animationCanvas.style.top = (wrapperRect.top - containerRect.top - canvas.height) + 'px';
                container.appendChild(animationCanvas);

                const actx = animationCanvas.getContext('2d');
                const particles = [];

                // 픽셀 분석 및 입자 생성 (퍼포먼스를 위해 4x4 그리드로 샘플링)
                const samplingRate = 4;
                for (let y = 0; y < canvas.height; y += samplingRate) {
                    for (let x = 0; x < canvas.width; x += samplingRate) {
                        const index = (y * canvas.width + x) * 4;
                        const alpha = pixels[index + 3];

                        if (alpha > 128) { // 투명하지 않은 픽셀만 입자로 변환
                            const color = {
                                r: pixels[index],
                                g: pixels[index + 1],
                                b: pixels[index + 2]
                            };
                            // 입자 시작 위치 (애니메이션 캔버스 중앙 하단부)
                            particles.push(new Particle(
                                x + canvas.width / 2, 
                                y + canvas.height, 
                                color, 
                                animationCanvas.width, 
                                animationCanvas.height
                            ));
                        }
                    }
                }

                // 애니메이션 루프
                function animate() {
                    actx.clearRect(0, 0, animationCanvas.width, animationCanvas.height);
                    
                    let aliveCount = 0;
                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update();
                        if (particles[i].draw(actx)) {
                            aliveCount++;
                        }
                    }

                    if (aliveCount > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        // 애니메이션 종료 후 정리 및 실제 데이터 삭제
                        animationCanvas.remove();
                        finishDelete(id);
                    }
                }

                // 애니메이션 시작
                requestAnimationFrame(animate);
            });
        }

        function finishDelete(id) {
            phrases = phrases.filter(p => p.id !== id);
            isSnapping = false;
            // 현재 모드에 맞춰 리스트 재렌더링
            if (document.getElementById('study-view').style.display === 'block') renderStudyMode();
            else renderList(currentMode);
        }

        // --- [2] 학습 모드 렌더링 & 관찰자 ---
        function renderStudyMode() {
            const studyView = document.getElementById('study-view');
            studyView.innerHTML = '';
            if (observer) observer.disconnect();

            phrases.forEach(p => {
                const block = document.createElement('div');
                block.className = 'phrase-block';
                block.innerHTML = `
                    <div class="category">${p.cat}</div>
                    <div class="japanese">${p.jp}</div>
                    <div class="reading">${p.rd}</div>
                    <div class="meaning">${p.mn}</div>
                `;
                studyView.appendChild(block);
            });

            const options = { threshold: 0.6 };
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                    else entry.target.classList.remove('active');
                });
            }, options);

            document.querySelectorAll('.phrase-block').forEach(b => observer.observe(b));
        }

        // 초기 실행
        filterList('all', document.getElementById('link-all'));
    </script>
</body>
</html>
