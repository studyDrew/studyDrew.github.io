<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Japanese - Apple List Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", sans-serif;
            line-height: 1.5;
        }

        /* Nav */
        .apple-nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 9999; border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
        }
        .nav-list { display: flex; justify-content: space-around; align-items: center; list-style: none; height: 100%; padding: 0 20px; }
        .nav-link { color: #f5f5f7; font-size: 16px; opacity: 0.5; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link.active { opacity: 1; font-weight: 600; }

        /* Content Container */
        .container { padding-top: 80px; max-width: 600px; margin: 0 auto; }
        .hero-section { padding: 20px; text-align: left; }
        .hero-section h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .hero-section p { color: #86868b; font-size: 14px; }

        /* Swipe List Style */
        .list-container { margin-top: 20px; overflow: hidden; }
        
        .list-item-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background-color: #1c1c1e; /* iOS Grouped Table Cell Color */
            margin-bottom: 1px;
            overflow: hidden;
            transition: transform 0.3s ease-out;
        }

        .list-item-content {
            width: 100%;
            padding: 16px 20px;
            background-color: #1c1c1e;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .category { font-size: 11px; color: #2997ff; font-weight: 600; margin-bottom: 4px; }
        .japanese { font-size: 17px; font-weight: 500; margin-bottom: 2px; }
        .reading { font-size: 13px; color: #86868b; }
        .meaning { font-size: 15px; color: #f5f5f7; margin-top: 4px; }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 80px;
            background-color: #ff3b30;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            z-index: 1;
            cursor: pointer;
        }

        /* Swipe State */
        .swiped .list-item-content { transform: translateX(-80px); }

        footer { padding: 40px 20px; text-align: center; color: #424245; font-size: 12px; }
    </style>
</head>
<body>

    <nav class="apple-nav">
        <ul class="nav-list">
            <li><a class="nav-link active" onclick="filterList('all', this)">모두보기</a></li>
            <li><a class="nav-link" onclick="filterList('jp', this)">일본어</a></li>
            <li><a class="nav-link" onclick="filterList('ko', this)">한국어</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="hero-section">
            <h1 id="hero-title">Phrases</h1>
            <p>왼쪽으로 밀어서 삭제할 수 있습니다.</p>
        </section>

        <div class="list-container" id="list-content"></div>
    </div>

    <footer><p>© 2026 Business Japanese Pro</p></footer>

    <script>
        let phrases = [
            { id: 1, cat: "인사 및 연락", jp: "お世話になっております。", rd: "오세와니 낫테 오리마스", mn: "신세지고 있습니다" },
            { id: 2, cat: "인사 및 연락", jp: "お疲れ様でございます。", rd: "오츠카레사마데 고자이마스", mn: "수고 많으십니다" },
            { id: 3, cat: "방문 및 회의", jp: "名刺を頂戴いたします。", rd: "메-시오 쵸-다이 이타시마스", mn: "명함 받겠습니다" },
            { id: 4, cat: "요청 및 문의", jp: "ご教示いただけますと幸いです。", rd: "고교-지 이타다케마스토 사이와이데스", mn: "알려주시면 감사하겠습니다" },
            { id: 5, cat: "승낙 및 거절", jp: "承知いたしました。", rd: "쇼-치 이타시마시타", mn: "알겠습니다" }
            // ... 데이터는 자유롭게 추가 가능
        ];

        const listDiv = document.getElementById('list-content');
        let currentMode = 'all';

        function renderList(mode = 'all') {
            currentMode = mode;
            listDiv.innerHTML = '';
            phrases.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = 'list-item-wrapper';
                wrapper.dataset.id = p.id;

                let innerHTML = `
                    <div class="list-item-content">
                        <div class="category">${p.cat}</div>
                `;

                if (mode === 'all' || mode === 'jp') {
                    innerHTML += `<div class="japanese">${p.jp}</div>`;
                    if(mode !== 'ko') innerHTML += `<div class="reading">${p.rd}</div>`;
                }
                if (mode === 'all' || mode === 'ko') {
                    innerHTML += `<div class="meaning">${p.mn}</div>`;
                }

                innerHTML += `</div><div class="delete-btn" onclick="deleteItem(${p.id})">삭제</div>`;
                wrapper.innerHTML = innerHTML;
                
                // 터치 이벤트 등록
                addSwipeEvents(wrapper);
                listDiv.appendChild(wrapper);
            });
        }

        let touchStartX = 0;
        let activeSwipeItem = null;

        function addSwipeEvents(el) {
            el.addEventListener('touchstart', (e) => {
                // 다른 아이템이 열려있으면 닫기
                if (activeSwipeItem && activeSwipeItem !== el) {
                    activeSwipeItem.classList.remove('swiped');
                }
                touchStartX = e.touches[0].clientX;
            });

            el.addEventListener('touchmove', (e) => {
                let touchMoveX = e.touches[0].clientX;
                let diff = touchStartX - touchMoveX;
                
                if (diff > 50) { // 왼쪽으로 밀 때
                    el.classList.add('swiped');
                    activeSwipeItem = el;
                } else if (diff < -50) { // 오른쪽으로 밀 때 닫기
                    el.classList.remove('swiped');
                }
            });
        }

        function deleteItem(id) {
            if(confirm("이 문장을 삭제하시겠습니까?")) {
                phrases = phrases.filter(p => p.id !== id);
                renderList(currentMode);
            }
        }

        function filterList(mode, btn) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            renderList(mode);
        }

        renderList();
    </script>
</body>
</html>
