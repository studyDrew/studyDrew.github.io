<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Japanese - Apple Style</title>
    <style>
        /* Apple-style Reset & Typography */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000; /* Apple 특유의 다크 모드 배경 */
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero h1 { font-size: 3rem; font-weight: 600; letter-spacing: -0.02em; }
        .hero p { color: #86868b; margin-top: 10px; font-size: 1.2rem; }

        /* Scroll Container */
        .phrase-container {
            padding: 0 10vw;
        }

        /* Each Phrase Block */
        .phrase-block {
            height: 80vh; /* 각 문장이 화면의 큰 부분을 차지하도록 설정 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
            opacity: 0.2; /* 기본적으로는 흐릿하게 */
            transform: scale(0.85); /* 기본적으로는 작게 */
        }

        /* Active State (스크롤 시 강조될 때) */
        .phrase-block.active {
            opacity: 1;
            transform: scale(1.2); /* 강조될 때 커지는 효과 */
        }

        .category {
            font-size: 0.9rem;
            color: #0071e3; /* Apple Blue */
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .japanese {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .reading {
            font-size: 1.2rem;
            color: #86868b;
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 1.5rem;
            color: #f5f5f7;
        }

        footer { height: 50vh; display: flex; align-items: center; justify-content: center; color: #424245; }
    </style>
</head>

            { cat: "요청 및 문의", jp: "締め切りを延ばしていただけますか。", rd: "시메키리오 노바시테 이타다케마스카", mn: "마감 기한을 연장해 주시겠습니까?" },
            { cat: "요청 및 문의", jp: "ご都合いかがでしょうか。", rd: "고츠고- 이카가데쇼-카", mn: "사정(시간)이 어떠신가요?" },
            { cat: "승낙 및 거절", jp: "承知いたしました。", rd: "쇼-치 이타시마시타", mn: "알겠습니다 (격식 있는 승낙)" },

            { cat: "사과 및 감사", jp: "貴重なご意見、ありがとうございます。", rd: "키쵸-나 고이켄, 아리가토-", mn: "귀중한 의견 감사합니다" },

        const contentDiv = document.getElementById('content');

        // 1. 블록 생성
        phrases.forEach(p => {
            const block = document.createElement('div');
            block.className = 'phrase-block';
            block.innerHTML = `
                <div class="category">${p.cat}</div>
                <div class="japanese">${p.jp}</div>
                <div class="reading">${p.rd}</div>
                <div class="meaning">${p.mn}</div>
            `;
            contentDiv.appendChild(block);
        });

        // 2. Intersection Observer 설정 (스크롤 감지 엔진)
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.6 // 요소의 60%가 화면 중앙 근처에 보일 때 실행
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, observerOptions);

        // 모든 블록에 관찰자 등록
        document.querySelectorAll('.phrase-block').forEach(block => {
            observer.observe(block);
        });
